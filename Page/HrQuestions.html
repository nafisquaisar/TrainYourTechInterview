    body {
      margin: 0;

      background: #c8d1e3;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #1f4fd8;
      font-weight: bold;
      text-decoration: none;
    }

    .section-title {
      margin: 30px 0 15px;
      color: #1f4fd8;
    }

    /* CARD */
    .qa-card {
      background: #fff;
      border-left: 5px solid #1f4fd8;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }

    .qa-content {
      flex: 1;
    }

    .question {
      font-weight: bold;
      cursor: pointer;
      color: #1f4fd8;
    }

    .question:hover {
      text-decoration: underline;
    }

    .answer {
      display: none;
      margin-top: 10px;
      background: #f6f8fc;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      white-space: pre-wrap;
    }

    /* CHECKBOX */
    .cb-wrap {
      display: inline-flex;
      align-items: center;
      cursor: pointer;
    }

    .cb-wrap input {
      display: none;
    }

    .cb {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid #1f4fd8;
      position: relative;
    }

    .cb::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 0;
      width: 6px;
      height: 11px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) scale(0);
      transition: 0.2s;
    }

    .cb-wrap input:checked + .cb {
      background: #1f4fd8;
    }

    .cb-wrap input:checked + .cb::after {
      transform: rotate(45deg) scale(1);
    }

    .done .question {
      opacity: 0.6;
      text-decoration: line-through;
    }

    .reset-box {
      text-align: center;
      margin-top: 40px;
    }

    button {
      padding: 10px 22px;
      border: none;
      border-radius: 6px;
      background: #1f4fd8;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>

/* =============================
   RENDER SECTION + QUESTIONS
   ============================= */

const container = document.getElementById("hrContent");
let counter = 0;

hrSections.forEach(section => {
  const h2 = document.createElement("h2");
  h2.className = "section-title";
  h2.textContent = section.title;
  container.appendChild(h2);

  section.questions.forEach(item => {
    const id = "hr_q_" + counter++;
    const card = document.createElement("div");
    card.className = "qa-card";

    card.innerHTML = `
      <div class="qa-content">
        <div class="question">${item.q}</div>
        <div class="answer">${item.a}</div>
      </div>
      <label class="cb-wrap">
        <input type="checkbox" id="${id}">
        <span class="cb"></span>
      </label>
    `;

    container.appendChild(card);
  });
});

/* TOGGLE ANSWER */
document.addEventListener("click", e => {
  if (e.target.classList.contains("question")) {
    const ans = e.target.nextElementSibling;
    ans.style.display = ans.style.display === "block" ? "none" : "block";
  }
});

/* CHECKBOX STORAGE */
document.querySelectorAll(".qa-card").forEach(card => {
  const cb = card.querySelector("input");
  cb.checked = localStorage.getItem(cb.id) === "true";
  if (cb.checked) card.classList.add("done");

  cb.addEventListener("change", () => {
    localStorage.setItem(cb.id, cb.checked);
    card.classList.toggle("done", cb.checked);
  });
});

/* RESET */
document.getElementById("resetBtn").addEventListener("click", () => {
  document.querySelectorAll(".qa-card").forEach(card => {
    const cb = card.querySelector("input");
    cb.checked = false;
    card.classList.remove("done");
    localStorage.removeItem(cb.id);
  });
});
