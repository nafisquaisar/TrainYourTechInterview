      flex-shrink: 0;

      top: 0;

      height: 11px;

  q: "1️⃣ Find the second highest salary",
  a: `
-- Query 1: Using MAX() with subquery (Most common)
SELECT MAX(salary)
FROM Employee
WHERE salary < (SELECT MAX(salary) FROM Employee);

Reason:
First finds the highest salary.
Then selects the maximum salary that is less than the highest.
Works in all SQL databases and handles duplicates correctly.


-- Query 2: Using DISTINCT + ORDER BY + LIMIT
SELECT DISTINCT salary
FROM Employee
ORDER BY salary DESC
LIMIT 1 OFFSET 1;

Reason:
Orders salaries in descending order.
OFFSET skips the highest salary.
DISTINCT ensures duplicate salaries are ignored.
Best for MySQL and PostgreSQL.


-- Query 3: Using DENSE_RANK() (Best interview answer)
SELECT salary
FROM (
    SELECT salary,
           DENSE_RANK() OVER (ORDER BY salary DESC) AS rnk
    FROM Employee
) t
WHERE rnk = 2;

Reason:
DENSE_RANK assigns same rank to duplicate salaries.
Rank 2 always represents the second highest distinct salary.
Preferred in real-world and advanced SQL interviews.


-- Query 4: Using NOT IN
SELECT MAX(salary)
FROM Employee
WHERE salary NOT IN (SELECT MAX(salary) FROM Employee);

Reason:
Removes the highest salary from the result set.
Then finds the maximum from remaining salaries.
Simple and commonly accepted in interviews.
`

SELECT e.dept_id, e.name, e.salary

    SELECT dept_id, MAX(salary)

);

Reason:

Outer query fetches employee name matching that salary.

SELECT dept_id, name, salary

    SELECT dept_id, name, salary,
           DENSE_RANK() OVER (PARTITION BY dept_id ORDER BY salary DESC) rnk

) t

Reason:

Rank 1 always represents highest salary.

ON e.dept_id = m.dept_id AND e.salary = m.max_salary;

Reason:
Derived table calculates max salary per department.
Join maps employees to that salary.
Clean and widely used in production queries.
`

-- Method 1: Self JOIN (Most common & important)
DELETE e1

Reason:

DELETE FROM Employees

    SELECT emp_id
    FROM (
        SELECT emp_id,
               ROW_NUMBER() OVER (PARTITION BY name ORDER BY emp_id) AS rn
        FROM Employees
    ) t

);

Reason:
ROW_NUMBER assigns a unique sequence within each duplicate group.
Deletes all rows except the first.
Very clean and interview-preferred.


-- Method 3: Using GROUP BY + MIN (Safe & logical)
DELETE FROM Employees
WHERE emp_id NOT IN (
    SELECT emp_id
    FROM (
        SELECT MIN(emp_id) AS emp_id
        FROM Employees
        GROUP BY name
    ) t
);


Reason:
Keeps the smallest emp_id for each name.
Deletes remaining duplicates.
Easy to understand and commonly asked.


-- Method 4: Using Temporary Table (Production safe)
CREATE TEMPORARY TABLE temp_emp AS
SELECT MIN(emp_id) AS emp_id
FROM Employees
GROUP BY name;

DELETE FROM Employees
WHERE emp_id NOT IN (SELECT emp_id FROM temp_emp);

Reason:
Avoids direct self-delete complexity.
Useful in large datasets and production systems.
`

  q: "45️⃣ What is GROUP BY?",
  a: `
GROUP BY is an SQL clause used to group rows that have the same values in one or more columns
and apply aggregate functions on each group.

It converts many rows into a single summary row per group.

-- Example
SELECT dept_id, COUNT(*)
FROM Employee
GROUP BY dept_id;

This groups employees by department and counts employees in each department.


🟢 Why GROUP BY is used:
To perform calculations (COUNT, SUM, MAX, MIN, AVG) on groups of data.


🟢 Important rules:
1) Every column in SELECT must be either:
   - present in GROUP BY, or
   - inside an aggregate function

2) GROUP BY is applied before HAVING.


🟢 Difference between WHERE and HAVING:
- WHERE filters rows before grouping
- HAVING filters groups after aggregation


🟢 Simple example:
SELECT salary, COUNT(*)
FROM Employee
GROUP BY salary
HAVING COUNT(*) > 1;

Finds salaries that appear more than once.


🧠 One-line memory trick:
GROUP BY makes one row per group, not per record.


🎤 Interview one-liner:
“GROUP BY groups rows with the same values and allows aggregate functions to be applied on each group.”
`

It ensures that only unique rows are returned.

-- Example
SELECT DISTINCT salary
FROM Employee;

This returns each salary only once, even if multiple employees have the same salary.


🟢 Why DISTINCT is used:
To fetch unique values.
To eliminate duplicate rows from query output.


🟢 Important points:
1) DISTINCT applies to the entire selected row, not just one column.
2) It is applied after the SELECT clause is processed.
3) DISTINCT can be used with multiple columns.


-- Multiple column example
SELECT DISTINCT dept_id, salary
FROM Employee;

This returns unique combinations of dept_id and salary.


🟢 DISTINCT vs GROUP BY:
- DISTINCT removes duplicate rows only.
- GROUP BY groups rows and supports aggregate functions.


🧠 One-line memory trick:
DISTINCT removes duplicate rows from SELECT results.


🎤 Interview one-liner:
“DISTINCT is used to return only unique rows from a query result.”
`

4️⃣ GROUP BY

}

const qaList = document.getElementById("qaList");

questions.forEach((item, index) => {
  const id = "sql_q_" + index;

  const card = document.createElement("div");
  card.className = "qa-card";

  card.innerHTML = `
    <div class="qa-content">
      <div class="question">${item.q}</div>
      <div class="answer">${item.a}</div>
    </div>
    <label class="cb-wrap">
      <input type="checkbox" id="${id}">
      <span class="cb"></span>
    </label>
  `;

  qaList.appendChild(card);
});

/* Toggle answer */
document.addEventListener("click", e => {
  if (e.target.classList.contains("question")) {
    const ans = e.target.nextElementSibling;
    ans.style.display = ans.style.display === "block" ? "none" : "block";
  }
});

/* Checkbox storage */
document.querySelectorAll(".qa-card").forEach(card => {
  const cb = card.querySelector("input");
  cb.checked = localStorage.getItem(cb.id) === "true";
  if (cb.checked) card.classList.add("done");

  cb.addEventListener("change", () => {
    localStorage.setItem(cb.id, cb.checked);
    card.classList.toggle("done", cb.checked);
  });
});

/* Reset */
document.getElementById("resetBtn").addEventListener("click", () => {
  document.querySelectorAll(".qa-card").forEach(card => {
    const cb = card.querySelector("input");
    cb.checked = false;
    card.classList.remove("done");
    localStorage.removeItem(cb.id);
  });
});
</script>
